# .github/workflows/ai-radar-pipeline.yml
name: AI Radar to LinkedIn Pipeline

on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC = 10:00 AM IST, daily
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Create agent session
        id: create_session
        run: |
          RESPONSE=$(curl -s -X POST https://api.anthropic.com/v1/sessions \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: managed-agents-2026-04-01" \
            -H "Content-Type: application/json" \
            -d '{
              "agent": "agt_01QC5fD7FNmtVcV7c7kU5XYF",
              "environment_id": "env_01EAy2jZb5hkEGrWjiMBptwe",
              "vault_ids": [
                "vlt_011Ca1chDCvs1eY521YAdFQU",
                "vlt_011CaDFy4WLtbMVvfTqRivxC"
              ],
              "title": "AI Radar Pipeline — Daily Run"
            }')
          SESSION_ID=$(echo $RESPONSE | jq -r '.id')
          if [ -z "$SESSION_ID" ] || [ "$SESSION_ID" = "null" ]; then
            echo "ERROR: Failed to create session. Response: $RESPONSE"
            exit 1
          fi
          echo "SESSION_ID=$SESSION_ID" >> $GITHUB_OUTPUT
          echo "Session created: $SESSION_ID"

      - name: Send trigger message
        run: |
          curl -s -X POST https://api.anthropic.com/v1/sessions/${{ steps.create_session.outputs.SESSION_ID }}/events \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: managed-agents-2026-04-01" \
            -H "Content-Type: application/json" \
            -d '{
              "events": [{
                "type": "user.message",
                "content": [{ "type": "text", "text": "Process today'\''s AI Productivity Radar digest." }]
              }]
            }'
          echo "Pipeline triggered. Agent will post confirmation to #ai-productivity-radar when complete (~15-20 min)."
          # No polling — agent self-reports via Slack when done.

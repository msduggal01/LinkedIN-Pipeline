# .github/workflows/ai-radar-pipeline.yml
name: AI Radar to LinkedIn Pipeline

on:
  schedule:
    - cron: '30 4 * * *'   # 04:30 UTC = 10:00 AM IST, daily
  workflow_dispatch:         # allows manual trigger from GitHub UI

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Create agent session
        id: create_session
        run: |
          RESPONSE=$(curl -s -X POST https://api.anthropic.com/v1/sessions \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: managed-agents-2026-04-01" \
            -H "Content-Type: application/json" \
            -d '{
              "agent": "agt_01QC5fD7FNmtVcV7c7kU5XYF",
              "environment_id": "env_01EAy2jZb5hkEGrWjiMBptwe",
              "vault_ids": [
                "vlt_011Ca1chDCvs1eY521YAdFQU",
                "vlt_011CaDFy4WLtbMVvfTqRivxC"
              ],
              "title": "AI Radar Pipeline — Daily Run"
            }')
          echo "SESSION_ID=$(echo $RESPONSE | jq -r '.id')" >> $GITHUB_OUTPUT

      - name: Send trigger message
        run: |
          curl -s -X POST https://api.anthropic.com/v1/sessions/${{ steps.create_session.outputs.SESSION_ID }}/events \
            -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
            -H "anthropic-version: 2023-06-01" \
            -H "anthropic-beta: managed-agents-2026-04-01" \
            -H "Content-Type: application/json" \
            -d '{
              "events": [{
                "type": "user.message",
                "content": [{ "type": "text", "text": "Process today'\''s AI Productivity Radar digest." }]
              }]
            }'

      - name: Wait for completion
        run: |
          SESSION_ID=${{ steps.create_session.outputs.SESSION_ID }}
          echo "Session $SESSION_ID is running. Agent will post confirmation to #ai-productivity-radar when done."
          
          # Poll until session goes idle (agent finished)
          for i in $(seq 1 60); do
            STATUS=$(curl -s https://api.anthropic.com/v1/sessions/$SESSION_ID \
              -H "x-api-key: ${{ secrets.ANTHROPIC_API_KEY }}" \
              -H "anthropic-version: 2023-06-01" \
              -H "anthropic-beta: managed-agents-2026-04-01" \
              | jq -r '.status')
            echo "[$i/60] Status: $STATUS"
            if [ "$STATUS" = "idle" ]; then
              echo "Pipeline complete."
              break
            fi
            sleep 30
          done
